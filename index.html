<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Cloud Reservoir Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f1319;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #3b82f6; margin-bottom: 5px; font-size: 1.8rem; }
        .cloud-badge {
            background-color: #1e293b;
            color: #38bdf8;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .dashboard {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 600px;
        }
        .card {
            background-color: #1e2530;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 200px;
            text-align: center;
            border: 1px solid #2d3748;
        }
        .value { font-size: 2.2rem; font-weight: bold; margin: 10px 0; color: #00f2fe; }
        .tank-container {
            width: 80px;
            height: 140px;
            border: 3px solid #cbd5e1;
            border-radius: 0 0 8px 8px;
            margin: 0 auto 15px auto;
            position: relative;
            background: #111827;
            overflow: hidden;
        }
        .water {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%; 
            background: linear-gradient(to top, #2563eb, #38bdf8);
            transition: height 0.4s ease;
        }
    </style>
</head>
<body>

    <h1>Reservoir Cloud Node</h1>
    <div class="cloud-badge">LIVE CLOUD CONNECTOR</div>
    
    <div class="dashboard">
        <div class="card">
            <h3>Niveau</h3>
            <div class="tank-container">
                <div id="water-level" class="water"></div>
            </div>
            <div id="percentage-text" class="value">0%</div>
        </div>

        <div class="card" style="display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <h3>Données</h3>
                <div id="distance-val" class="value">-- cm</div>
                <p id="tank-status">Connexion au cloud...</p>
            </div>
            <div style="border-top: 1px solid #2d3748; padding-top: 15px;">
                <h3>Pompe</h3>
                <div id="pump-status" style="font-size: 1.5rem; font-weight: bold; color: #ef4444;">OFF</div>
            </div>
        </div>
    </div>

    <script>
        // Using the secure port 443 over WebSockets to bypass the security block
        const client = mqtt.connect('wss://broker.hivemq.com:443/mqtt', {
            clientId: 'CloudDash-' + Math.floor(Math.random() * 100000),
            clean: true,
            connectTimeout: 4000
        });

        const topicDistance = "mon_reservoir/distance";
        const topicPump = "mon_reservoir/pompe";

        client.on('connect', () => {
            document.getElementById('tank-status').innerText = "Status: En Ligne";
            client.subscribe(topicDistance);
            client.subscribe(topicPump);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            
            if (topic === topicDistance) {
                const distance = parseFloat(payload);
                document.getElementById('distance-val').innerText = distance.toFixed(0) + " cm";
                
                let percentage = ((400 - distance) / 400) * 100;
                if(percentage < 0) percentage = 0;
                if(percentage > 100) percentage = 100;

                document.getElementById('percentage-text').innerText = Math.round(percentage) + "%";
                document.getElementById('water-level').style.height = percentage + "%";
                
                if (distance < 100) document.getElementById('tank-status').innerText = "Status: PLEIN";
                else if (distance < 250) document.getElementById('tank-status').innerText = "Status: MOYEN";
                else document.getElementById('tank-status').innerText = "Status: VIDE";
            }

            if (topic === topicPump) {
                const pumpElement = document.getElementById('pump-status');
                pumpElement.innerText = payload;
                pumpElement.style.color = (payload === "ON") ? "#22c55e" : "#ef4444";
            }
        });

        client.on('error', (err) => {
            console.log('MQTT Error: ', err);
            document.getElementById('tank-status').innerText = "Erreur Connexion";
        });

        client.on('close', () => {
            document.getElementById('tank-status').innerText = "Recherche Flux...";
        });
    </script>
</body>
</html>
